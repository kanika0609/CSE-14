<!DOCTYPE html> 
<html> 
<head> 
  <title>Student Marks and Grade Calculator</title> 
</head> 
<body style="font-family: Arial, sans-serif; background:#f4f4f4; margin:0; 
padding:20px;"> 
  <div style="max-width:500px; margin:auto; background:white; padding:20px; border
radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);"> 
    <h2 style="text-align:center;">Student Marks and Grade Calculator</h2> 
    <label>Number of Subjects:</label> 
    <input type="number" id="subjects" style="width:100%; padding:8px; margin:8px 0;"> 
    <button onclick="getMarks()" style="width:100%; padding:10px; background:#007bff; 
color:white; border:none; border-radius:5px;">Calculate</button> 
    <div id="output" style="margin-top:15px; font-weight:bold;"></div> 
  </div> 
 
  <script> 
    function getMarks() { 
      let n = parseInt(document.getElementById("subjects").value); 
      let total = 0; 
      for (let i = 1; i <= n; i++) { 
        let mark = parseFloat(prompt("Enter marks for subject " + i)); 
        total += mark; 
      } 
      let avg = total / n; 
      let grade = avg >= 90 ? "A+" : avg >= 80 ? "A" : avg >= 70 ? "B" : avg >= 60 ? "C" : avg 
>= 50 ? "D" : "Fail"; 
      document.getElementById("output").innerHTML = "Total: " + total + "<br>Average: " 
+ avg.toFixed(2) + "<br>Grade: " + grade; 
    } 
  </script> 
</body> 
</html>
