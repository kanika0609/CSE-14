<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Content changes</title>
</head>
<body>
    <div class="container">
        <h2 id="mainHeading">Welcome to JavaScript</h2>
        <br>
        <input type="text" id="heading" placeholder="Enter new heading">
        <br>
        <button id="newHeading">Change heading</button>
        <button id="newBackground">Change Background</button>
        <button id="changeFont">Increase FontSize</button>
        <button id="togglebtn">Show/Hide Paragraph</button>
        <button id="reset">Reset</button>
        <p id="paragraph">
            This is a sample paragraph. JavaScript events can dynamically change events.
        </p>
    </div>
    <script src="main.jsx"></script>
</body>
</html>
