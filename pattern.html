<!DOCTYPE html>
<html>
<head>
    <title> Pattern programs </title>
</head>
<body>
    <h2> pattern programs using javascript </h2>
    <script>
        
let n = 5;
// 1. Simple Pyramid 
console.log("\nSimple Pyramid");
for(let i=1;i<=n;i++){
    let s="";
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

// 2. Flipped Simple Pyramid 
console.log("\nFlipped Simple Pyramid");
for(let i=1;i<=n;i++){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+="  ";
    }
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

// 3. Inverted Pyramid 
console.log("\nInverted Pyramid");
for(let i=n;i>=1;i--){
    let s="";
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

// 4. Flipped Inverted Pyramid
console.log("\nFlipped Inverted Pyramid");
for(let i=n;i>=1;i--){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+="  ";
    }
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

// 5. Triangle
console.log("\nTriangle");
for(let i=1;i<=n;i++){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+=" ";
    }
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

//6. Inverted triangle
console.log("\nInverted Triangle");
for(let i=n;i>=1;i--){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+=" ";
    }
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

//7. half diamond
console.log("\nHalf Diamond");
for(let i=1;i<=n;i++){
    let s="";
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}
for(let i=n-1;i>=1;i--){
    let s="";
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

//8. flipped half diamond
console.log("\nFlipped Half Diamond");
for(let i=1;i<=n;i++){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+="  ";
    }
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}
for(let i=n-1;i>=1;i--){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+="  ";
    }
    for(let j=1;j<=i;j++){
        s+="* ";
    }
    console.log(s);
}

//9. diamond
console.log("\nDiamond Pattern");
for(let i=1;i<=n;i++){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+=" ";
    }
    for(let j=1;j<=2*i-1;j++){
        s+="*";
    }
    console.log(s);
}
for(let i=n-1;i>=1;i--){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+=" ";
    }
    for(let j=1;j<=2*i-1;j++){
        s+="*";
    }
    console.log(s);
}

//10. hourglass 
console.log("\nHourglass Pattern");
for(let i=n;i>=1;i--){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+=" ";
    }
    for(let j=1;j<=2*i-1;j++){
        s+="*";
    }
    console.log(s);
}
for(let i=2;i<=n;i++){
    let s="";
    for(let j=1;j<=n-i;j++){
        s+=" ";
    }
    for(let j=1;j<=2*i-1;j++){
        s+="*";
    }
    console.log(s);
}

//11. Number pyramid
console.log("\nNumber Pyramid");
for(let i=1;i<=4;i++){
    let s="";
    for(let j=1;j<=i;j++){
        s+=i+" ";
    }
    console.log(s);
}

//12. rotated number pyramid
console.log("\nRotated Number Pyramid");
for(let i=1;i<=4;i++){
    let s="";
    let num=i;
    for(let j=1;j<=i;j++){
        s+=num+" ";
        num++;
    }
    console.log(s);
}

//13. palindrome triangle
console.log("\nPalindrome Triangle");
for(let i=1;i<=4;i++){
    let s="";
    for(let j=1;j<=4-i;j++){
        s+=" ";
    }
    for(let j=1;j<=i;j++){
        s+=j;
    }
    for(let j=i-1;j>=1;j--){
        s+=j;
    }
    console.log(s);
}

//14. alphabet pyramid
console.log("\nAlphabet Pyramid");
for(let i=1;i<=4;i++){
    let s="";
    let ch=String.fromCharCode(64+i);
    for(let j=1;j<=i;j++){
        s+=ch+" ";
    }
    console.log(s);
}

//15. continuous alphabet pyramid
console.log("\nContinuous Alphabet Pyramid");
let ch=65;
for(let i=1;i<=4;i++){
    let s="";
    for(let j=1;j<=i;j++){
        s+=String.fromCharCode(ch)+" ";
        ch++;
    }
    console.log(s);
}
 </script>
</body>
</html>
